<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, "Apple SD Gothic Neo", sans-serif;
        width: 340px;
        margin: 0;
        padding: 12px;
        color: #222;
      }
      h3 {
        margin: 0 0 10px;
        font-size: 14px;
      }
      .row {
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 8px;
      }
      .title {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 6px;
        word-break: break-all;
      }
      .meta {
        font-size: 11px;
        color: #888;
        margin-bottom: 6px;
      }
      button {
        font-size: 12px;
        padding: 5px 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-right: 6px;
      }
      .dl {
        background: #1dc078;
        color: #fff;
      }
      .cp {
        background: #eef;
        color: #335;
      }
      .empty {
        font-size: 12px;
        color: #888;
        line-height: 1.5;
      }
      .clear {
        background: #f5f5f5;
        color: #999;
        float: right;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h3>캡처된 자막 <button id="clear" class="clear">전체 삭제</button></h3>
    <div id="list"></div>
    <script src="popup.js"></script>
  </body>
</html>
